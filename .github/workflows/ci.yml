name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Convex API types
        run: pnpm exec convex codegen

      - name: Verify generated Convex files are committed
        run: git diff --exit-code convex/_generated

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

